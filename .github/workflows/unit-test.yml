name: Run Unit Tests

# Runs on pushes to pull request
on: pull_request

jobs:
  build:
    name: Compile and Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'
      - name: Build and Run Test
        run: make run-test
